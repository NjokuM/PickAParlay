# Fly.io continuous deployment — triggers on every push to main.
# Required secret: FLY_API_TOKEN  (Settings → Secrets → Actions)
# Generate at: https://fly.io/user/personal_access_tokens

name: Fly Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group    # one deploy at a time
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify FLY_API_TOKEN is set
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "❌  FLY_API_TOKEN secret is not set."
            echo "    Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "    Generate a token at: https://fly.io/user/personal_access_tokens"
            exit 1
          fi
          echo "✅  FLY_API_TOKEN is present (${#FLY_API_TOKEN} chars)"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --verbose
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
