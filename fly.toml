# PickAParlay — Fly.io deployment config
# Deploy: fly launch → fly deploy
# Persistent volume: fly volumes create pap_data --size 1 --region lhr

app = "pickaparlay"
primary_region = "lhr"  # London — closest to you

[build]

[env]
  DATABASE_PATH = "/data/pickaparlay.db"
  CACHE_DIR = "/data/cache"
  CORS_ORIGINS = "*"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "pap_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
